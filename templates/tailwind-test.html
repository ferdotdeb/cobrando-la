{% extends 'base.html' %}

{% block title %}Demo Tailwind CSS{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center">
    <div class="max-w-md w-full space-y-8 p-8">
        <div class="text-center">
            <h1 class="text-4xl font-bold text-emerald-600 mb-4">
                ✅ Tailwind CSS funcionando
            </h1>
            <p class="text-gray-600 text-lg mb-6">
                CSS compilado y minificado para producción
            </p>
            <div class="bg-gradient-to-r from-emerald-500 to-blue-500 text-white p-6 rounded-lg shadow-lg">
                <p class="font-semibold">
                    Este es un ejemplo con clases de Tailwind
                </p>
            </div>
            <div class="mt-6 space-x-4">
                <button class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2 px-4 rounded transition duration-200">
                    Botón Primary
                </button>
                <button class="bg-gray-300 hover:bg-gray-400 text-gray-800 font-bold py-2 px-4 rounded transition duration-200">
                    Botón Secondary
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
